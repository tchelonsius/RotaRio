<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>RotaRio</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; }

        #logo {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: white;
            padding: 10px 16px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            line-height: 1;
        }
        #logo .logo-text { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
        #logo .logo-text span:first-child { color: #009c3b; }
        #logo .logo-text span:last-child  { color: #FFDF00; -webkit-text-stroke: 0.5px #ccc; }
        #logo .logo-sub { font-size: 9px; color: #009c3b; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

        #panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: white;
            border-radius: 14px;
            padding: 14px 18px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.18);
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 320px;
        }

        .panel-row { display: flex; gap: 10px; align-items: center; }

        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #btn-origin { background: #009c3b; color: white; }
        #btn-dest   { background: #002776; color: white; }
        #btn-search { background: #FFDF00; color: #002776; width: 100%; padding: 10px; font-size: 14px; border: none; }

        .info-row { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .info-item { font-size: 11px; color: #555; display: flex; align-items: center; gap: 6px; }

        .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
        .dot.green { background: #009c3b; }
        .dot.blue  { background: #002776; }
        .dot.gray  { background: #ccc; }

        #hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0,39,118,0.85);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: none;
            pointer-events: none;
        }

        /* painel de resultados */
        #results {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            background: white;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.2);
            min-width: 280px;
            max-width: 320px;
            display: none;
        }
        #results h3 {
            font-size: 13px;
            color: #002776;
            font-weight: 800;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .route-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            border-left: 4px solid;
        }
        .route-card:last-child { margin-bottom: 0; }
        .route-card.rank-1 { background: #f0fdf4; border-color: #009c3b; }
        .route-card.rank-2 { background: #fffbeb; border-color: #f59e0b; }
        .route-card.rank-3 { background: #fef2f2; border-color: #ef4444; }

        .route-badge {
            font-size: 18px;
            font-weight: 900;
            min-width: 36px;
            text-align: center;
        }
        .rank-1 .route-badge { color: #009c3b; }
        .rank-2 .route-badge { color: #f59e0b; }
        .rank-3 .route-badge { color: #ef4444; }

        .route-info { flex: 1; }
        .route-number { font-size: 15px; font-weight: 800; color: #111; }
        .route-name   { font-size: 11px; color: #666; margin-top: 1px; }
        .route-score  { font-size: 10px; color: #999; margin-top: 2px; }
    </style>
</head>
<body>

<div id="logo">
    <div class="logo-text"><span>Rota</span><span>Rio</span></div>
    <div class="logo-sub">Rio de Janeiro</div>
</div>

<div id="panel">
    <div class="panel-row">
        <button class="btn" id="btn-origin">📍 Origem</button>
        <button class="btn" id="btn-dest">🎯 Destino</button>
        <div class="info-row">
            <div class="info-item">
                <div class="dot gray" id="dot-origin"></div>
                <span id="lbl-origin">Origem: aguardando GPS...</span>
            </div>
            <div class="info-item">
                <div class="dot gray" id="dot-dest"></div>
                <span id="lbl-dest">Destino: não definido</span>
            </div>
        </div>
    </div>
    <button class="btn" id="btn-search" disabled>🔍 Buscar Rotas Seguras</button>
</div>

<div id="hint">Clique no mapa para definir o ponto</div>

<div id="results">
    <h3>🛡️ Rotas mais seguras</h3>
    <div id="results-list"></div>
</div>

<div id="map"></div>

<script>
    const map = L.map('map').setView([-22.9068, -43.1729], 13)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map)

    let originMarker = null, destMarker = null
    let origin = null, destination = null
    let mode = null

    const btnOrigin  = document.getElementById('btn-origin')
    const btnDest    = document.getElementById('btn-dest')
    const btnSearch  = document.getElementById('btn-search')
    const lblOrigin  = document.getElementById('lbl-origin')
    const lblDest    = document.getElementById('lbl-dest')
    const dotOrigin  = document.getElementById('dot-origin')
    const dotDest    = document.getElementById('dot-dest')
    const hint       = document.getElementById('hint')
    const results    = document.getElementById('results')
    const resultsList = document.getElementById('results-list')

    function setMode(m) {
        mode = m
        map.getContainer().style.cursor = m ? 'crosshair' : ''
        hint.style.display = m ? 'block' : 'none'
        btnOrigin.style.background = m === 'origin'      ? '#f59e0b' : '#009c3b'
        btnDest.style.background   = m === 'destination' ? '#f59e0b' : '#002776'
        btnOrigin.textContent = m === 'origin'      ? '❌ Cancelar' : '📍 Origem'
        btnDest.textContent   = m === 'destination' ? '❌ Cancelar' : '🎯 Destino'
    }

    function setOrigin(lat, lon) {
        origin = [lon, lat]
        if (originMarker) map.removeLayer(originMarker)
        originMarker = L.marker([lat, lon], {
            icon: L.divIcon({
                className: '',
                html: '<div style="background:#009c3b;width:14px;height:14px;border-radius:50%;border:2px solid white;box-shadow:0 0 6px rgba(0,0,0,0.4)"></div>',
                iconAnchor: [7, 7]
            })
        }).addTo(map).bindPopup('📍 Origem').openPopup()
        lblOrigin.textContent = `Origem: ${lat.toFixed(4)}, ${lon.toFixed(4)}`
        dotOrigin.className = 'dot green'
        checkReady()
    }

    function setDestination(lat, lon) {
        destination = [lon, lat]
        if (destMarker) map.removeLayer(destMarker)
        destMarker = L.marker([lat, lon], {
            icon: L.divIcon({
                className: '',
                html: '<div style="background:#002776;width:14px;height:14px;border-radius:50%;border:2px solid white;box-shadow:0 0 6px rgba(0,0,0,0.4)"></div>',
                iconAnchor: [7, 7]
            })
        }).addTo(map).bindPopup('🎯 Destino').openPopup()
        lblDest.textContent = `Destino: ${lat.toFixed(4)}, ${lon.toFixed(4)}`
        dotDest.className = 'dot blue'
        checkReady()
    }

    function checkReady() {
        btnSearch.disabled = !(origin && destination)
    }

    let routeLayers = []

    function parseWKT(wkt) {
        // converte WKT LINESTRING ou MULTILINESTRING para array de [lat, lng]
        if (wkt.startsWith('MULTILINESTRING')) {
            const parts = wkt.replace('MULTILINESTRING (', '').replace(/\)$/, '').split('),(')
            return parts.flatMap(part =>
                part.replace(/[()]/g, '').trim().split(',').map(p => {
                    const [lng, lat] = p.trim().split(' ')
                    return [parseFloat(lat), parseFloat(lng)]
                })
            )
        } else {
            return wkt.replace('LINESTRING (', '').replace(')', '').split(',').map(p => {
                const [lng, lat] = p.trim().split(' ')
                return [parseFloat(lat), parseFloat(lng)]
            })
        }
    }

    function showRoutes(routes) {
        // remove rotas anteriores do mapa
        routeLayers.forEach(l => map.removeLayer(l))
        routeLayers = []

        const top3   = routes.slice(0, 3)
        const medals = ['🥇', '🥈', '🥉']
        const ranks  = ['rank-1', 'rank-2', 'rank-3']
        const labels = ['Mais segura', '2ª mais segura', '3ª mais segura']
        const colors = ['#009c3b', '#f59e0b', '#ef4444']

        top3.forEach((r, i) => {
            if (r.shape) {
                const coords = parseWKT(r.shape)
                const line = L.polyline(coords, {
                    color: colors[i],
                    weight: 4,
                    opacity: 0.8
                }).addTo(map)
                .bindPopup(`${medals[i]} Linha ${r.route_short_name} — ${r.route_long_name}`)
                routeLayers.push(line)
            }
        })

        // centraliza o mapa nas rotas
        if (routeLayers.length > 0) {
            const group = L.featureGroup(routeLayers)
            map.fitBounds(group.getBounds(), { padding: [40, 40] })
        }

        resultsList.innerHTML = top3.map((r, i) => `
            <div class="route-card ${ranks[i]}">
                <div class="route-badge">${medals[i]}</div>
                <div class="route-info">
                    <div class="route-number">Linha ${r.route_short_name}</div>
                    <div class="route-name">${r.route_long_name}</div>
                    <div class="route-score">${labels[i]}</div>
                </div>
            </div>
        `).join('')

        results.style.display = 'block'
    }

    // GPS
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude
                const lon = pos.coords.longitude
                map.setView([lat, lon], 15)
                setOrigin(lat, lon)
            },
            (err) => {
                let msg = 'Não foi possível obter sua localização.'
                if (err.code === 1) msg += '\n\nPermissão negada.'
                if (err.code === 2) msg += '\n\nLocalização indisponível.'
                if (err.code === 3) msg += '\n\nTempo esgotado.'
                msg += '\n\nUse o botão "Origem" para definir manualmente.'
                alert(msg)
                lblOrigin.textContent = 'Origem: use o botão para definir'
            },
            { enableHighAccuracy: true, timeout: 10000 }
        )
    } else {
        alert('Seu navegador não suporta geolocalização.')
    }

    btnOrigin.addEventListener('click', () => setMode(mode === 'origin' ? null : 'origin'))
    btnDest.addEventListener('click',   () => setMode(mode === 'destination' ? null : 'destination'))

    map.on('click', (e) => {
        const { lat, lng } = e.latlng
        if (mode === 'origin') {
            setOrigin(lat, lng)
            setMode(null)
        } else if (mode === 'destination') {
            setDestination(lat, lng)
            setMode(null)
        }
    })

    btnSearch.addEventListener('click', async () => {
        btnSearch.textContent = '⏳ Buscando...'
        btnSearch.disabled = true
        results.style.display = 'none'

        try {
            const res = await fetch(
                `http://127.0.0.1:5000/secure_bus_routes?origin=${encodeURIComponent(origin[0]+','+origin[1])}&destination=${encodeURIComponent(destination[0]+','+destination[1])}`
            )
            const routes = await res.json()

            if (routes.error) {
                alert('⚠️ ' + routes.error)
            } else if (routes.length === 0) {
                alert('⚠️ Nenhuma rota encontrada entre os dois pontos.')
            } else {
                showRoutes(routes)
            }
        } catch (err) {
            console.log('erro:', err)
            alert('❌ Erro ao buscar rotas.\nVerifique se o servidor está rodando.')
        }

        btnSearch.textContent = '🔍 Buscar Rotas Seguras'
        btnSearch.disabled = false
    })
</script>
</body>
</html>
